version: '3.8'

services:
  photo-verify-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Photo Verification API
      - WORKER_POOL_SIZE=4
      - BATCH_TIMEOUT_SECONDS=45
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models

  redis:
    image: redis:alpine
    container_name: photo_verify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
